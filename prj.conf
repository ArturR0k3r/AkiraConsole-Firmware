# AkiraConsole product-level Kconfig overlay.
# Board-specific options (ESP32-S3, PSRAM, display, WiFi, BT …) are in
# boards/akiraconsole_esp32s3_procpu.conf and are merged automatically by west.
# Only add overrides here that are specific to the AkiraConsole *product* and
# should not live in the platform (AkiraOS) prj.conf.

# AkiraConsole ships with the full console shell UI.
CONFIG_AKIRA_CONSOLE_SHELL=y

# App manager for persistent WASM install/uninstall.
CONFIG_AKIRA_APP_MANAGER=y
